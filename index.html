<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITAL SCRIPT by OpangDarmawan</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --panel: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 10px;
    }
    .digital-script-app {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: var(--bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      box-sizing: border-box;
    }
    .app-header {
      text-align: center;
      margin-bottom: 16px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    .app-header span { color: var(--accent); }
    .canvas-wrapper {
      position: relative;
      background: #fff;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: crosshair;
      aspect-ratio: 4/3;
      touch-action: none;
    }
    #sketchCanvas { display: block; width: 100%; height: 100%; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
      align-items: center;
      justify-content: center;
    }
    .control-group { display: flex; flex-direction: column; gap: 4px; }
    .control-label { font-size: 0.75rem; color: #64748b; font-weight: 500; }
    select, button {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    select:hover, button:hover { border-color: var(--accent); }
    button:active { transform: scale(0.98); }
    #deleteBtn { border-color: var(--danger); color: var(--danger); }
    #deleteBtn:hover { background: var(--danger); color: #fff; }
    #repeatBtn { background: var(--accent); color: #fff; border: none; }
    #repeatBtn:hover { background: var(--accent-hover); }
    .status { text-align: center; margin-top: 10px; font-size: 0.8rem; color: #64748b; min-height: 1.2em; }
    @media (max-width: 500px) {
      .controls { flex-direction: column; }
      .app-header { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="digital-script-app">
    <div class="app-header">DIGITAL SCRIPT by <span>OpangDarmawan</span></div>
    <div class="canvas-wrapper" id="canvasContainer">
      <canvas id="sketchCanvas"></canvas>
    </div>
    <div class="controls">
      <div class="control-group">
        <label class="control-label">Brush Pen</label>
        <select id="brushType">
          <option value="pencil">✏️ Pencil (Fine + Grain)</option>
          <option value="pen">🖋️ Pen (Smooth + Consistent)</option>
          <option value="charcoal">🌑 Charcoal (Soft + Textured)</option>
          <option value="brush">🖌️ Brush (Variable Pressure)</option>
        </select>
      </div>
      <div class="control-group">
        <label class="control-label">Color</label>
        <select id="colorType">
          <option value="#111827">Black</option>
          <option value="#4b5563">Dark Gray</option>
          <option value="#2563eb">Ink Blue</option>
          <option value="#dc2626">Crimson</option>
          <option value="#78350f">Sepia</option>
        </select>
      </div>
      <div class="control-group">
        <label class="control-label">Actions</label>
        <div style="display:flex; gap:8px;">
          <button id="deleteBtn">🗑️ Delete</button>
          <button id="repeatBtn">🔁 Repeat from Start</button>
        </div>
      </div>
    </div>
    <div class="status" id="status">Draw freely to generate realistic sketch animation</div>
  </div>

  <script>
    (function() {
      'use strict';
      const canvas = document.getElementById('sketchCanvas');
      const ctx = canvas.getContext('2d', { alpha: true, desynchronized: true });
      const container = document.getElementById('canvasContainer');
      const brushSelect = document.getElementById('brushType');
      const colorSelect = document.getElementById('colorType');
      const deleteBtn = document.getElementById('deleteBtn');
      const repeatBtn = document.getElementById('repeatBtn');
      const statusEl = document.getElementById('status');

      let isDrawing = false;
      let points = [];
      let strokeHistory = []; // {points, brush, color, timestamp}
      let animationId = null;
      let currentBrush = brushSelect.value;
      let currentColor = colorSelect.value;

      // Canvas setup
      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        redrawHistory();
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // Brush engine
      const brushPresets = {
        pencil: { width: 1.2, lineCap: 'round', lineJoin: 'round', grain: 0.3, pressure: false },
        pen:    { width: 1.8, lineCap: 'square', lineJoin: 'round', grain: 0, pressure: false },
        charcoal: { width: 3.5, lineCap: 'round', lineJoin: 'round', grain: 0.6, pressure: true },
        brush:  { width: 2.5, lineCap: 'round', lineJoin: 'round', grain: 0.1, pressure: true }
      };

      // Drawing logic
      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        return { x, y };
      }

      function startDraw(e) {
        if (animationId) cancelAnimationFrame(animationId);
        isDrawing = true;
        points = [];
        const pos = getPos(e);
        points.push(pos);
        e.preventDefault();
      }

      function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);
        const prev = points[points.length - 1];
        const velocity = Math.hypot(pos.x - prev.x, pos.y - prev.y);
        
        points.push({ x: pos.x, y: pos.y, velocity, timestamp: Date.now() });
        renderStrokeSegment(prev, pos, velocity);
      }

      function endDraw() {
        if (!isDrawing || points.length < 2) return;
        isDrawing = false;
        strokeHistory.push({
          points: [...points],
          brush: currentBrush,
          color: currentColor,
          completed: Date.now()
        });
        statusEl.textContent = `✅ Sketch captured. ${strokeHistory.length} strokes saved.`;
      }

      function renderStrokeSegment(p1, p2, velocity) {
        const preset = brushPresets[currentBrush];
        ctx.strokeStyle = currentColor;
        ctx.lineCap = preset.lineCap;
        ctx.lineJoin = preset.lineJoin;
        ctx.lineWidth = preset.pressure ? Math.max(1, preset.width * (1 - velocity * 0.05)) : preset.width;
        ctx.globalAlpha = 0.9;

        // Procedural grain simulation
        if (preset.grain > 0) {
          const segments = Math.max(1, Math.floor(preset.width * 2));
          for (let i = 0; i < segments; i++) {
            ctx.beginPath();
            const offset = (Math.random() - 0.5) * preset.grain * 3;
            ctx.moveTo(p1.x + offset, p1.y + offset);
            ctx.quadraticCurveTo(
              (p1.x + p2.x) / 2 + offset,
              (p1.y + p2.y) / 2 + offset,
              p2.x + offset, p2.y + offset
            );
            ctx.stroke();
          }
        } else {
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

      function redrawHistory() {
        ctx.clearRect(0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));
        strokeHistory.forEach(stroke => {
          for (let i = 1; i < stroke.points.length; i++) {
            renderStrokeSegment(stroke.points[i-1], stroke.points[i], stroke.points[i].velocity || 1);
          }
        });
      }

      // Animation replay
      function replayAnimation() {
        if (strokeHistory.length === 0) {
          statusEl.textContent = "Nothing to replay. Draw something first.";
          return;
        }
        statusEl.textContent = "🔁 Replaying sketch animation from start...";
        ctx.clearRect(0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));
        
        let strokeIndex = 0;
        let pointIndex = 0;
        const totalPoints = strokeHistory.reduce((sum, s) => sum + s.points.length, 0);
        let renderedPoints = 0;

        function step() {
          if (strokeIndex >= strokeHistory.length) {
            statusEl.textContent = "✅ Animation complete.";
            return;
          }
          const stroke = strokeHistory[strokeIndex];
          const preset = brushPresets[stroke.brush];
          currentBrush = stroke.brush;
          currentColor = stroke.color;
          
          ctx.strokeStyle = currentColor;
          ctx.lineCap = preset.lineCap;
          ctx.lineJoin = preset.lineJoin;
          
          if (pointIndex < stroke.points.length - 1) {
            const p1 = stroke.points[pointIndex];
            const p2 = stroke.points[pointIndex + 1];
            const vel = p2.velocity || 1;
            renderStrokeSegment(p1, p2, vel);
            pointIndex++;
            renderedPoints++;
          } else {
            strokeIndex++;
            pointIndex = 0;
          }
          animationId = requestAnimationFrame(step);
        }
        animationId = requestAnimationFrame(step);
      }

      // Event Listeners
      canvas.addEventListener('mousedown', startDraw);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', endDraw);
      canvas.addEventListener('mouseleave', endDraw);
      
      canvas.addEventListener('touchstart', startDraw, { passive: false });
      canvas.addEventListener('touchmove', draw, { passive: false });
      canvas.addEventListener('touchend', endDraw);

      brushSelect.addEventListener('change', (e) => { currentBrush = e.target.value; });
      colorSelect.addEventListener('change', (e) => { currentColor = e.target.value; });

      deleteBtn.addEventListener('click', () => {
        if (animationId) cancelAnimationFrame(animationId);
        strokeHistory = [];
        points = [];
        ctx.clearRect(0, 0, canvas.width / (window.devicePixelRatio || 1), canvas.height / (window.devicePixelRatio || 1));
        statusEl.textContent = "🗑️ Canvas cleared. Start fresh.";
      });

      repeatBtn.addEventListener('click', replayAnimation);
    })();
  </script>
</body>
</html>
