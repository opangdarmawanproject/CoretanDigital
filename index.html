<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE Ai by OpangDarmawan</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
            margin-bottom: 15px;
        }
        .upload-area:hover {
            border-color: var(--primary-color);
        }
        .upload-area img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 6px;
            display: none;
            margin-top: 10px;
        }
        input[type="file"] {
            display: none;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        .result-area {
            margin-top: 20px;
            text-align: center;
        }
        .result-area img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .loading {
            display: none;
            margin-top: 15px;
            color: var(--primary-color);
            font-weight: 500;
        }
        .security-note {
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <h2>FREE Ai by OpangDarmawan</h2>

    <div class="upload-area" id="uploadArea">
        <p>📁 Click or drag to upload an image</p>
        <input type="file" id="imageInput" accept="image/*">
        <img id="previewImage" alt="Preview">
    </div>

    <textarea id="promptInput" placeholder="Describe how you want to transform this image (e.g., 'Make it look like a cyberpunk city at night')..."></textarea>

    <button id="generateBtn" disabled>Generate Image</button>

    <div class="loading" id="loadingText">⏳ Processing your image... (This may take a few seconds)</div>

    <div class="result-area" id="resultArea"></div>

    <div class="security-note">
        🔒 Secure & Embeddable. API keys are handled securely via backend proxy. <br>
        © 2024 OpangDarmawan. Open Source on GitHub.
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const previewImage = document.getElementById('previewImage');
        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const loadingText = document.getElementById('loadingText');
        const resultArea = document.getElementById('resultArea');

        let selectedFile = null;

        // Handle file selection
        uploadArea.addEventListener('click', () => imageInput.click());
        
        imageInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                selectedFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImage.src = e.target.result;
                    previewImage.style.display = 'block';
                    generateBtn.disabled = false;
                };
                reader.readAsDataURL(selectedFile);
            }
        });

        // Handle Generation
        generateBtn.addEventListener('click', async () => {
            if (!selectedFile || !promptInput.value.trim()) {
                alert('Please upload an image and enter a prompt.');
                return;
            }

            generateBtn.disabled = true;
            loadingText.style.display = 'block';
            resultArea.innerHTML = '';

            try {
                // SECURITY BEST PRACTICE: 
                // Do NOT put your API key here in the frontend code. 
                // Instead, send the file and prompt to YOUR OWN backend server, 
                // which will securely attach the API key and forward the request 
                // to the AI provider (e.g., Hugging Face, Replicate, Stability AI).
                
                const formData = new FormData();
                formData.append('image', selectedFile);
                formData.append('prompt', promptInput.value);

                // Replace this URL with your secure backend endpoint
                const API_ENDPOINT = 'https://your-secure-backend.com/api/generate-img2img'; 

                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Generation failed. Please try again.');
                }

                // Assuming the backend returns the image as a Blob or a URL
                const imageUrl = URL.createObjectURL(await response.blob());
                
                const resultImg = document.createElement('img');
                resultImg.src = imageUrl;
                resultImg.alt = 'Generated Image';
                resultArea.appendChild(resultImg);

            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during generation. Check console for details.');
            } finally {
                generateBtn.disabled = false;
                loadingText.style.display = 'none';
            }
        });
    </script>
</body>
</html>
