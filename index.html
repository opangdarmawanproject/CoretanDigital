<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE Ai by OpangDarmawan - Image to Image</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Hide scrollbar for clean embed */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex items-center justify-center p-4">

    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-white text-center">
            <h1 class="text-3xl font-extrabold tracking-tight">FREE Ai by OpangDarmawan</h1>
            <p class="text-indigo-100 mt-2 text-sm">Image-to-Image Generator (Powered by AI)</p>
        </div>

        <div class="p-6 md:p-8 space-y-6">
            <!-- Upload Section -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-slate-700">1. Unggah Gambar Awal</label>
                <div class="flex items-center justify-center w-full">
                    <label for="image-upload" class="flex flex-col items-center justify-center w-full h-48 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition relative overflow-hidden group">
                        <div id="upload-placeholder" class="flex flex-col items-center justify-center pt-5 pb-6">
                            <i class="fa-solid fa-cloud-arrow-up text-4xl text-slate-400 mb-3 group-hover:text-indigo-500 transition"></i>
                            <p class="mb-2 text-sm text-slate-500"><span class="font-semibold">Klik untuk unggah</span> atau seret gambar</p>
                            <p class="text-xs text-slate-400">PNG, JPG, JPEG</p>
                        </div>
                        <img id="image-preview" class="absolute inset-0 w-full h-full object-contain hidden bg-black/5" alt="Preview Gambar">
                        <input id="image-upload" type="file" class="hidden" accept="image/*" />
                    </label>
                </div>
            </div>

            <!-- Prompt Section -->
            <div class="space-y-2">
                <label for="prompt" class="block text-sm font-semibold text-slate-700">2. Deskripsikan Perubahan (Prompt)</label>
                <textarea id="prompt" rows="3" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none resize-none" placeholder="Contoh: Ubah gambar ini menjadi gaya lukisan cat air, atau tambahkan kacamata hitam..."></textarea>
            </div>

            <!-- Action Button -->
            <button id="generate-btn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transform transition hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-indigo-300 flex justify-center items-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
                <span id="btn-text">Hasilkan Gambar</span>
                <div id="btn-spinner" class="spinner hidden"></div>
            </button>

            <!-- Error Message -->
            <div id="error-message" class="hidden p-4 mb-4 text-sm text-red-800 rounded-lg bg-red-50 border border-red-200 text-center">
            </div>

            <!-- Result Section -->
            <div id="result-section" class="hidden space-y-2 pt-4 border-t border-slate-100">
                <label class="block text-sm font-semibold text-slate-700">Hasil Gambar</label>
                <div class="rounded-xl overflow-hidden border border-slate-200 bg-slate-100 flex items-center justify-center min-h-[300px] relative">
                    <img id="result-image" class="max-w-full max-h-[500px] object-contain" alt="Hasil AI">
                    <a id="download-btn" href="#" download="OpangDarmawan_AI_Result.jpg" class="absolute bottom-4 right-4 bg-white/90 backdrop-blur-sm text-slate-800 hover:text-indigo-600 p-3 rounded-full shadow-lg transition" title="Unduh Gambar">
                        <i class="fa-solid fa-download"></i>
                    </a>
                </div>
            </div>
        </div>
        
        <div class="bg-slate-50 p-4 text-center text-xs text-slate-400 border-t border-slate-100">
            &copy; 2026 FREE Ai by OpangDarmawan. All rights reserved.
        </div>
    </div>

    <script>
        // Konfigurasi API yang disediakan oleh environment
        const apiKey = ""; 

        // Elemen DOM
        const imageUpload = document.getElementById('image-upload');
        const uploadPlaceholder = document.getElementById('upload-placeholder');
        const imagePreview = document.getElementById('image-preview');
        const promptInput = document.getElementById('prompt');
        const generateBtn = document.getElementById('generate-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const resultSection = document.getElementById('result-section');
        const resultImage = document.getElementById('result-image');
        const downloadBtn = document.getElementById('download-btn');
        const errorMessage = document.getElementById('error-message');

        let currentBase64Image = null;
        let currentMimeType = null;

        // Handle Image Upload & Preview
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            currentMimeType = file.type;
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const dataUrl = event.target.result;
                imagePreview.src = dataUrl;
                imagePreview.classList.remove('hidden');
                uploadPlaceholder.classList.add('hidden');
                
                // Extract base64 part
                currentBase64Image = dataUrl.split(',')[1];
            };
            
            reader.readAsDataURL(file);
            hideError();
        });

        // Tampilkan pesan error
        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        // Sembunyikan pesan error
        function hideError() {
            errorMessage.classList.add('hidden');
        }

        // Set state tombol loading
        function setLoading(isLoading) {
            if (isLoading) {
                generateBtn.disabled = true;
                btnText.textContent = "Memproses...";
                btnSpinner.classList.remove('hidden');
                resultSection.classList.add('hidden');
                hideError();
            } else {
                generateBtn.disabled = false;
                btnText.textContent = "Hasilkan Gambar";
                btnSpinner.classList.add('hidden');
            }
        }

        // Fetch dengan fungsi Exponential Backoff
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`Gagal menghubungi server (Status: ${response.status})`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    // Wait for the specified delay before retrying
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // Handle Generate Button Click
        generateBtn.addEventListener('click', async () => {
            const promptText = promptInput.value.trim();

            if (!currentBase64Image) {
                showError("Mohon unggah gambar awal terlebih dahulu.");
                return;
            }
            if (!promptText) {
                showError("Mohon masukkan deskripsi (prompt) perubahan.");
                return;
            }

            setLoading(true);

            // Endpoint Model Image-to-Image (gemini-2.5-flash-image-preview)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [
                    {
                        role: "user",
                        parts: [
                            { text: promptText },
                            {
                                inlineData: {
                                    mimeType: currentMimeType,
                                    data: currentBase64Image
                                }
                            }
                        ]
                    }
                ],
                generationConfig: {
                    responseModalities: ["IMAGE"]
                }
            };

            try {
                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                // Ekstrak hasil gambar dari respon JSON
                const generatedBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                const generatedMimeType = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.mimeType || 'image/jpeg';

                if (generatedBase64) {
                    const imageSource = `data:${generatedMimeType};base64,${generatedBase64}`;
                    resultImage.src = imageSource;
                    downloadBtn.href = imageSource;
                    resultSection.classList.remove('hidden');
                    
                    // Scroll ke hasil
                    setTimeout(() => {
                        resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 100);
                } else {
                    showError("AI tidak mengembalikan gambar. Coba gunakan prompt yang berbeda.");
                }

            } catch (error) {
                console.error("Error generation:", error);
                showError("Terjadi kesalahan saat menghasilkan gambar. Silakan coba beberapa saat lagi.");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
